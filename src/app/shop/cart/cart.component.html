<div class="container">

  <!-- Cart Header -->
  <div class="cart-header">
    <h2 class="section-title">🛒 Your Cart</h2>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="cart.get().length === 0">
    <span class="empty-icon">🛒</span>
    <p>Your cart is empty</p>
    <a routerLink="/" class="btn-primary" style="display:block;text-align:center;text-decoration:none;padding:0.85rem;">
      Browse Mangoes
    </a>
  </div>

  <!-- Cart Items -->
  <div class="cart-items" *ngIf="cart.get().length > 0">
    <div class="cart-item card" *ngFor="let item of cart.get(); let i = index">

      <div class="item-info">
        <span class="item-name">{{ item.name }}</span>

        <!-- Editable Quantity -->
        <div class="qty-wrap">
          <input type="number" min="1" class="qty-input" [value]="item.weight" (change)="updateQty(i, $event)" />
          <span class="unit">kg</span>
        </div>
      </div>

      <div class="item-actions">
        <!-- Total price per item -->
        <span class="item-price">
          ₹{{ item.price * item.weight }}
        </span>

        <button class="remove-btn" (click)="cart.remove(i)">✖</button>
      </div>

    </div>

    <!-- Total -->
    <div class="total-card card">
      <div class="total-row">
        <span class="total-label">Subtotal</span>
        <span class="total-amount">₹{{ total() }}</span>
      </div>
    </div>

    <!-- Checkout Button -->
    <button class="btn-primary" routerLink="/checkout">
      Proceed to Checkout →
    </button>
  </div>

</div>
