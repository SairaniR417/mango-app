<div class="container">

  <!-- Logged In -->
  <div *ngIf="auth.user()">

    <div class="profile-card card">
      <div class="avatar">{{ getInitial() }}</div>
      <div class="profile-info">
        <h2 class="profile-name">{{ auth.user()?.name || 'Mango Lover' }}</h2>
        <p class="profile-phone">📞 {{ auth.user()?.phone }}</p>
      </div>
    </div>

    <div class="actions-card card">
      <a routerLink="/" class="menu-item">
        <span>🥭 Browse Mangoes</span>
        <span class="chevron">›</span>
      </a>
      <a routerLink="/cart" class="menu-item">
        <span>🛒 My Cart</span>
        <span class="chevron">›</span>
      </a>
    </div>

    <button class="btn-secondary logout-btn" (click)="auth.logout()">
      Sign Out
    </button>

  </div>

  <!-- Not Logged In -->
  <div class="guest-state" *ngIf="!auth.user()">
    <span class="guest-icon">👤</span>
    <h2>You're not logged in</h2>
    <p>Sign in to track your orders and save your details</p>
    <a routerLink="/login" class="btn-primary" style="display:block;text-align:center;text-decoration:none;padding:0.85rem;border-radius:14px;">
      Login with OTP →
    </a>
  </div>

</div>
