<div class="login-bg">
  <div class="login-card">

    <!-- Logo / Brand -->
    <div class="brand">
      <span class="brand-icon">🥭</span>
      <h1 class="brand-name">Mango</h1>
      <p class="brand-tagline">Fresh from the farm, right to your door</p>
    </div>

    <!-- STEP 1: Phone Entry -->
    <div class="form-step" *ngIf="step === 'phone'">
      <h2 class="step-title">Sign In</h2>
      <p class="step-sub">We'll send a 6-digit OTP to your phone</p>

      <div class="input-group">
        <label for="name-input">Your Name <span class="optional">(optional)</span></label>
        <input
          id="name-input"
          type="text"
          [(ngModel)]="name"
          placeholder="e.g. Ravi Kumar"
          autocomplete="name"
        />
      </div>

      <div class="input-group">
        <label for="phone-input">Phone Number</label>
        <div class="phone-row">
          <span class="country-code">🇮🇳 +91</span>
          <input
            id="phone-input"
            type="tel"
            [(ngModel)]="phone"
            placeholder="9999999999"
            maxlength="10"
            inputmode="numeric"
            autocomplete="tel"
          />
        </div>
      </div>

      <div class="error-msg" *ngIf="error">⚠️ {{ error }}</div>

      <button class="btn-primary" (click)="sendOtp()" [disabled]="loading">
        <span *ngIf="!loading">Send OTP →</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </div>

    <!-- STEP 2: OTP Entry -->
    <div class="form-step" *ngIf="step === 'otp'">
      <button class="back-btn" (click)="goBack()">← Change number</button>

      <h2 class="step-title">Enter OTP</h2>
      <p class="step-sub">Sent to <strong>+91 {{ phone }}</strong></p>

      <div class="input-group">
        <label for="otp-input">6-Digit OTP</label>
        <input
          id="otp-input"
          type="tel"
          [(ngModel)]="otp"
          placeholder="_ _ _ _ _ _"
          maxlength="6"
          inputmode="numeric"
          class="otp-input"
          autocomplete="one-time-code"
        />
      </div>

      <div class="error-msg" *ngIf="error">⚠️ {{ error }}</div>
      <div class="success-msg" *ngIf="successMsg">✅ {{ successMsg }}</div>

      <button class="btn-primary" (click)="verifyOtp()" [disabled]="loading">
        <span *ngIf="!loading">Verify & Login</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="resend-row">
        <span *ngIf="resendCooldown > 0" class="resend-timer">
          Resend OTP in {{ resendCooldown }}s
        </span>
        <button *ngIf="resendCooldown === 0" class="resend-btn" (click)="resendOtp()">
          Resend OTP
        </button>
      </div>
    </div>

  </div>
</div>
